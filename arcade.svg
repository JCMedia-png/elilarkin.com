<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#0e1234"/>
  <g fill="#232a5c">
    <rect x="40" y="50" width="6" height="6"/><rect x="180" y="120" width="4" height="4"/>
    <rect x="320" y="60" width="5" height="5"/><rect x="520" y="90" width="4" height="4"/>
    <rect x="90" y="260" width="4" height="4"/><rect x="420" y="230" width="6" height="6"/>
    <rect x="560" y="330" width="4" height="4"/><rect x="150" y="420" width="5" height="5"/>
    <rect x="60" y="540" width="4" height="4"/><rect x="300" y="500" width="6" height="6"/>
    <rect x="480" y="470" width="4" height="4"/><rect x="240" y="330" width="4" height="4"/>
  </g>
  <!-- invader 1 -->
  <g transform="translate(90,120) scale(4)" fill="#1f2a63">
    <rect x="2" y="0" width="2" height="2"/><rect x="8" y="0" width="2" height="2"/>
    <rect x="0" y="2" width="12" height="2"/>
    <rect x="0" y="4" width="2" height="2"/><rect x="4" y="4" width="4" height="2"/><rect x="10" y="4" width="2" height="2"/>
    <rect x="0" y="6" width="12" height="2"/>
    <rect x="2" y="8" width="2" height="2"/><rect x="8" y="8" width="2" height="2"/>
    <rect x="0" y="10" width="2" height="2"/><rect x="10" y="10" width="2" height="2"/>
  </g>
  <!-- invader 2 -->
  <g transform="translate(430,350) scale(4)" fill="#2c2160">
    <rect x="4" y="0" width="4" height="2"/>
    <rect x="2" y="2" width="8" height="2"/>
    <rect x="0" y="4" width="12" height="2"/>
    <rect x="0" y="6" width="4" height="2"/><rect x="8" y="6" width="4" height="2"/>
    <rect x="2" y="8" width="2" height="2"/><rect x="8" y="8" width="2" height="2"/>
    <rect x="0" y="10" width="2" height="2"/><rect x="4" y="10" width="4" height="2"/><rect x="10" y="10" width="2" height="2"/>
  </g>
  <!-- pixel heart -->
  <g transform="translate(260,470) scale(3.5)" fill="#3a2158">
    <rect x="2" y="0" width="4" height="2"/><rect x="8" y="0" width="4" height="2"/>
    <rect x="0" y="2" width="14" height="4"/>
    <rect x="2" y="6" width="10" height="2"/>
    <rect x="4" y="8" width="6" height="2"/>
    <rect x="6" y="10" width="2" height="2"/>
  </g>
  <!-- pixel coin -->
  <g transform="translate(500,140) scale(3)" fill="#38366b">
    <rect x="2" y="0" width="6" height="2"/>
    <rect x="0" y="2" width="10" height="6"/>
    <rect x="2" y="8" width="6" height="2"/>
    <rect x="4" y="2" width="2" height="6" fill="#0e1234"/>
  </g>
  <!-- d-pad -->
  <g transform="translate(140,320) scale(3)" fill="#1d2a5a">
    <rect x="4" y="0" width="4" height="12"/>
    <rect x="0" y="4" width="12" height="4"/>
  </g>
</svg>
